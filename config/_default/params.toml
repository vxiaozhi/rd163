# 网站标题
title = "研发日志 · R&D Log"
# 网站默认主题 ("light", "dark", "black", "auto")
defaultTheme = "auto"
# 公共 git 仓库路径, 仅在 enableGitInfo 设为 true 时有效
gitRepo = "https://github.com/vxiaozhi/rd163"
# 日期格式
dateFormat = "2006-01-02"
# 网站图片, 用于 Open Graph 和 Twitter Cards
images = ["/imgs/vxiaozhi.png"]
# 开启 PWA 支持
enablePWA = false
# 许可协议信息 (支持 HTML 格式)
license = '<a rel="license external nofollow noopener noreferrer" href="https://creativecommons.org/licenses/by-nc/4.0/" target="_blank">CC BY-NC 4.0</a>'
# [Experimental] Bundle js
bundle = false

# 作者信息
[author]
  name = "小智晖"
  email = "whutluohui@gmail.com"
  link = "https://github.com/vxiaozhi"
  avatar = "https://github.com/vxiaozhi.png"

# 图片配置
[image]
  # 缓存远程图片链接到本地(关闭:文章中有大量外部图床链接,缓存会导致构建超时)
  cacheRemote = false
  # 图片缩放和优化
  optimise = true

# 页面头部导航栏配置
[header]
  # 主题切换模式 ("switch", "select")
  themeChangeMode = "switch"
  # 页面头部导航栏标题配置
  [header.title]
    # LOGO 的 URL
    logo = ""
    # 标题名称
    name = "研发日志 · R&D Log"
    pre = '<i class="fa-solid fa-terminal fa-fw" aria-hidden="true"></i>'
    post = ""
    # 是否为标题显示打字机动画
    typeit = false

# 页面底部信息配置
[footer]
  enable = true
  # 自定义内容 (支持 HTML 格式)
  custom = ''
  # 是否显示 Hugo 和主题信息
  hugo = true
  # 托管服务信息 (支持 HTML 格式)
  hostedOn = ''
  # 是否显示版权信息
  copyright = true
  # 是否显示作者
  author = true
  # 网站创立年份
  since = 2025
  # ICP 备案信息, 仅在中国使用 (支持 HTML 格式)
  icp = '<a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener nofollow">粤ICP备14102071号-1</a>'
  # 许可协议信息 (支持 HTML 格式)
  license = '<a rel="license external nofollow noopener noreferrer" href="https://creativecommons.org/licenses/by-nc/4.0/" target="_blank">CC BY-NC 4.0</a>'

# Section (所有文章) 页面配置
[section]
  # section 页面每页显示文章数量
  paginate = 20
  # 日期格式 (月和日)
  dateFormat = "01-02"
  # RSS 文章数目
  rss = 10
  # 最近更新文章设置
  [section.recentlyUpdated]
    enable = true
    rss = true
    days = 30
    maxCount = 10

# List (目录或标签) 页面配置
[list]
  # list 页面每页显示文章数量
  paginate = 20
  # 日期格式 (月和日)
  dateFormat = "01-02"
  # RSS 文章数目
  rss = 10

# 文章页面配置
[page]
  # 是否在主页隐藏一篇文章
  hiddenFromHomePage = false
  # 是否在搜索结果中隐藏一篇文章
  hiddenFromSearch = false
  # 是否使用 twemoji
  twemoji = false
  # 是否使用 lightgallery (图片点击放大)
  lightgallery = true
  # 是否使用 ruby 扩展语法
  ruby = true
  # 是否使用 fraction 扩展语法
  fraction = true
  # 是否显示原始 Markdown 文档内容的链接
  linkToMarkdown = false
  # 是否在 RSS 中显示全文内容
  rssFullText = false
  # 是否使用系列导航
  seriesNavigation = true
  # 是否启用最后修改时间
  enableLastMod = true
  # 是否启用字数统计
  enableWordCount = true
  # 是否启用阅读时间估计
  enableReadingTime = true

  # instant.page 配置(鼠标悬停预加载,提升访问速度)
  [page.instantpage]
    enable = true

  # 过时文章提醒
  [page.outdatedArticleReminder]
    enable = false
    reminder = 90
    warning = 180

  # 目录配置
  [page.toc]
    # 是否使用目录
    enable = true
    # 是否保持使用文章前面的静态目录
    keepStatic = false
    # 是否使侧边目录自动折叠展开
    auto = true

  # 代码配置
  [page.code]
    # 默认展开显示的代码行数
    maxShownLines = 10
    # 是否显示代码行号
    lineNos = true
    # 是否开启代码换行
    wrap = false
    # 是否显示代码块标题
    header = true

  # 表格配置
  [page.table]
    # 是否开启表格排序
    sort = true

  # 标题自动编号
  [page.header]
    [page.header.number]
      enable = false
      [page.header.number.format]
        h2 = "{h2} {title}"
        h3 = "{h2}.{h3} {title}"
        h4 = "{h2}.{h3}.{h4} {title}"
        h5 = "{h2}.{h3}.{h4}.{h5} {title}"
        h6 = "{h2}.{h3}.{h4}.{h5}.{h6} {title}"

  # KaTeX 数学公式配置
  [page.math]
    enable = true
    copyTex = true
    mhchem = true
    mathjax = false

  # 文章页面的分享信息设置
  [page.share]
    enable = true
    Baidu = false
    Blogger = false
    Buffer = false
    Digg = false
    Evernote = false
    Facebook = false
    Flipboard = false
    HackerNews = true
    Instapaper = false
    Line = false
    Linkedin = false
    Mix = false
    Myspace = false
    Odnoklassniki = false
    Pinterest = false
    Pocket = false
    Reddit = false
    Renren = false
    Skype = false
    Stumbleupon = false
    Telegram = true
    Trello = false
    Tumblr = false
    Twitter = true
    VK = false
    Weibo = true
    Weixin = ""
    Whatsapp = false
    Xing = false
    Mastodon = false

  # PlantUML 配置
  [page.plantuml]
    server = "https://www.plantuml.com/plantuml"

  # 评论系统设置(本地预览阶段关闭,后续可按需开启)
  [page.comment]
    enable = false

  # 第三方库配置
  [page.library]
    [page.library.css]
    [page.library.js]

  # 页面 SEO 配置
  [page.seo]
    images = []
    [page.seo.publisher]
      name = "小智晖"
      logoUrl = "https://github.com/vxiaozhi.png"

  # 相关文章推荐配置
  [page.related]
    enable = true
    count = 5

# 赞助设置
[sponsor]
  enable = false
  bio = "如果你觉得这篇文章对你有所帮助,欢迎赞赏~"
  link = "https://github.com/sponsors/vxiaozhi"

# TypeIt 配置
[typeit]
  speed = 100
  cursorSpeed = 1000
  cursorChar = "|"
  duration = -1

# 网站 SEO 配置
[seo]
  image = "/imgs/home-bg-o.jpg"
  thumbnailUrl = ""
  # alternateName = ["小智晖的博客"]

# 网站分析配置(本地预览阶段关闭)
[analytics]
  enable = false

# Cookie 许可配置
[cookieconsent]
  enable = false

# 第三方库文件的 CDN 设置
[cdn]
  data = ""

# 兼容性设置
[compatibility]
  polyfill = false
